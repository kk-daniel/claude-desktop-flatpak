name: Build Flatpak

on:
  push:
    branches: [ main ]
    tags:
      - "claude-*"
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      auto_merge_pr:
        description: "Auto-merge PR number"
        required: false
        default: ""

env:
  APP_ID: ai.claude.Claude

jobs:
  post-renovate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor == 'renovate[bot]' && (github.head_ref == 'renovate/claude' || github.head_ref == 'renovate/major-claude' || github.head_ref == 'renovate/7zip' || github.head_ref == 'renovate/major-7zip' || github.head_ref == 'renovate/electron' || github.head_ref == 'renovate/major-electron')
    outputs:
      changes_detected: ${{ steps.commit.outputs.changes_detected }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}
          fetch-depth: 2
      - name: Capture dependency versions
        id: dependency-versions-before
        run: |
          set -eo pipefail
          versions="$(
            {
              grep -m 1 "url: https://downloads\.claude\.ai/releases/win32/x64/" ${APP_ID}/${APP_ID}.yaml | awk -F/ '{print "claude=" $7}'
              grep -m 1 "url: https://github\.com/ip7z/7zip/releases/download/" ${APP_ID}/${APP_ID}.yaml | awk -F/ '{print "7zip=" $8}'
              grep -m 1 "url: https://github\.com/electron/electron/releases/download/v" ${APP_ID}/${APP_ID}.yaml | awk -F/ '{sub(/^v/, "", $8); print "electron=" $8}'
            } | sort
          )"
          {
            echo "versions<<EOF"
            printf "%s\n" "$versions"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update checksums
        if: github.head_ref == 'renovate/claude' || github.head_ref == 'renovate/major-claude'
        run: ./${APP_ID}/update-checksum.sh
      - name: Update metainfo
        if: github.head_ref == 'renovate/claude' || github.head_ref == 'renovate/major-claude'
        run: ./${APP_ID}/update-metainfo.sh
      - name: Update 7-Zip checksums
        if: github.head_ref == 'renovate/7zip' || github.head_ref == 'renovate/major-7zip'
        run: ./${APP_ID}/update-7zip-checksum.sh
      - name: Update Electron checksums
        if: github.head_ref == 'renovate/electron' || github.head_ref == 'renovate/major-electron'
        run: ./${APP_ID}/update-electron-checksum.sh
      - name: Verify dependency versions unchanged
        env:
          BEFORE: ${{ steps.dependency-versions-before.outputs.versions }}
        run: |
          set -eo pipefail
          after="$(
            {
              grep -m 1 "url: https://downloads\.claude\.ai/releases/win32/x64/" ${APP_ID}/${APP_ID}.yaml | awk -F/ '{print "claude=" $7}'
              grep -m 1 "url: https://github\.com/ip7z/7zip/releases/download/" ${APP_ID}/${APP_ID}.yaml | awk -F/ '{print "7zip=" $8}'
              grep -m 1 "url: https://github\.com/electron/electron/releases/download/v" ${APP_ID}/${APP_ID}.yaml | awk -F/ '{sub(/^v/, "", $8); print "electron=" $8}'
            } | sort
          )"
          if [ "$after" != "$BEFORE" ]; then
            echo "Dependency versions changed while refreshing checksums." >&2
            diff -u <(printf "%s\n" "$BEFORE") <(printf "%s\n" "$after") || true
            exit 1
          fi

      - name: Get last commit message
        id: last-commit
        run: |
          echo "message=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"
          echo "author=$(git log -1 --pretty=\"%an <%ae>\")" >> "$GITHUB_OUTPUT"
      - name: Commit changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_author: ${{ steps.last-commit.outputs.author }}
          commit_message: ${{ steps.last-commit.outputs.message }}
          commit_options: '--amend --no-edit'
          push_options: '--force'
          file_pattern: ${{ env.APP_ID }}/${{ env.APP_ID }}.yaml ${{ env.APP_ID }}/${{ env.APP_ID }}.metainfo.xml

  extract-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
      version-changed: ${{ steps.extract-version.outputs.version-changed }}
    needs: post-renovate
    if: >-
      always() && !cancelled() &&
      needs.post-renovate.result == 'skipped'
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 2
      - name: Extract version
        id: extract-version
        run: |
          set -eo pipefail
          URL="$(grep -A 5 'filename: Claude-Setup-x64.exe' ${APP_ID}/${APP_ID}.yaml | grep -o 'url: .*' | head -1 | cut -d' ' -f2)"
          VERSION="$(echo "$URL" | sed -n 's#.*/win32/x64/\([0-9][0-9.]*\)/.*#\1#p')"
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from URL: $URL" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            # Initial commit: no parent to diff against, treat as new version.
            echo "version-changed=true" >> "$GITHUB_OUTPUT"
          elif git diff HEAD~1..HEAD ${APP_ID}/${APP_ID}.yaml | grep -A 5 'filename: Claude-Setup-x64.exe' | grep -q '^.\s*url: '; then
            echo "version-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "version-changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    permissions:
      contents: read
      checks: write
    needs: extract-version
    if: >-
      always() && !cancelled() &&
      needs.extract-version.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
      - name: Setup GPG
        env:
          GPG_KEY_GREP: ${{ vars.GPG_KEY_GREP }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
        run: |
          set -eo pipefail
          gpg --list-keys --with-keygrip
          echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye
          echo "$GPG_PASSPHRASE" | /usr/libexec/gpg-preset-passphrase --preset "$GPG_KEY_GREP"
          echo "$GPG_PRIVATE_KEY" > repo.private.gpg
          gpg --import --batch repo.private.gpg
          rm repo.private.gpg
          rm -f repo.gpg
          gpg --export "$GPG_KEY_ID" > repo.gpg
      - name: Restore repository
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
        run: |
          set -eo pipefail
          BASE_URL="$(gh api /repos/${GITHUB_REPOSITORY}/pages --jq .html_url)"
          curl -o/dev/null -sf "${BASE_URL}summary" || exit 0
          ostree --repo=repo init --mode=archive
          ostree --repo=repo remote add claude-flatpak "${BASE_URL%/}" --gpg-import=repo.gpg
          ostree --repo=repo pull --mirror claude-flatpak --depth=-1
          find repo/refs/heads/app repo/refs/heads/runtime -type f -not -name main -delete
          flatpak build-update-repo --gpg-sign="$GPG_KEY_ID" --generate-static-deltas --prune repo
          curl -o repo/config -sf "${BASE_URL}config"
          rm -rf repo/*.trustedkeys.gpg repo/extensions repo/state repo/tmp
      - name: Clean branch name
        id: clean-branch-name
        env:
          BRANCH: ${{ (github.ref_type == 'tag' && 'main') || github.head_ref || github.ref_name }}
        run: echo "branch=${BRANCH//\//-}" >> "$GITHUB_OUTPUT"
      - name: Build Flatpak
        id: build-flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6.7
        with:
          build-bundle: false
          upload-artifact: false
          manifest-path: ${{ env.APP_ID }}/${{ env.APP_ID }}.yaml
          branch: ${{ steps.clean-branch-name.outputs.branch }}
          gpg-sign: ${{ vars.GPG_KEY_ID }}
      - name: Create bundle
        id: create-bundle
        env:
          BRANCH: ${{ steps.clean-branch-name.outputs.branch }}
        run: |
          flatpak --user remote-add --no-gpg-verify build-repo repo
          flatpak --user install --noninteractive build-repo ${{ env.APP_ID }}//$BRANCH
          flatpak build-bundle ~/.local/share/flatpak/repo ${{ env.APP_ID }}.flatpak --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo ${{ env.APP_ID }} $BRANCH
      - name: Upload bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.APP_ID }}-x86_64.flatpak
          path: ${{ env.APP_ID }}.flatpak
      - name: Update repo
        id: update-repo
        env:
          GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
        run: flatpak build-update-repo --gpg-sign="$GPG_KEY_ID" --generate-static-deltas --prune repo
      - name: Initialize github-pages
        id: init-github-pages
        run: |
          set -eo pipefail
          gpg_base64="$(base64 -w 0 repo.gpg)"
          cat > repo/claude.flatpakrepo <<EOF
          [Flatpak Repo]
          Title=Claude
          Url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          Homepage=https://claude.ai
          GPGKey=$gpg_base64
          EOF
          cat > repo/index.html <<EOF
          <!DOCTYPE html>
          <html>
            <head><title>Claude Flatpak Repository</title></head>
            <body>
              <h1>Claude</h1>
              <p>This is an unofficial Flatpak repository for Claude Desktop.</p>
              <pre>flatpak remote-add --if-not-exists claude-flatpak https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/claude.flatpakrepo
          flatpak install ${APP_ID}</pre>
            </body>
          </html>
          EOF
      - name: Upload repository as artifact (tags only)
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flatpak-repo
          path: repo/
          retention-days: 30
      - name: Save pages artifact
        id: save-repo
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: repo/
      - name: Publish check result
        uses: LouisBrunner/checks-action@937cbbcde3259005b50746dc91cde29098aac2ff # v3.1.0
        if: always()
        with:
          token: ${{ github.token }}
          name: Build Result
          conclusion: >-
            ${{ (steps.build-flatpak.conclusion == 'success' && steps.save-repo.conclusion == 'skipped' && 'failure' ) || (steps.build-flatpak.conclusion == 'success' && steps.save-repo.conclusion) || steps.build-flatpak.conclusion }}
          output: |
            {
              "summary": "${{ (steps.build-flatpak.conclusion == 'success' && steps.save-repo.conclusion == 'skipped' && 'failure' ) || (steps.build-flatpak.conclusion == 'success' && steps.save-repo.conclusion) || steps.build-flatpak.conclusion }}",
              "text_description": "Build flatpak: ${{ steps.build-flatpak.conclusion }}\nUpdate repo: ${{ steps.update-repo.conclusion }}\nInit github pages: ${{ steps.init-github-pages.conclusion }}\nSave repo: ${{ steps.save-repo.conclusion }}"
            }

  auto-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    needs: [build, extract-version]
    if: >-
      always() && !cancelled() &&
      needs.build.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      github.ref_type != 'tag' &&
      needs.extract-version.outputs.version-changed == 'true'
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Download flatpak artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "*.flatpak"
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: claude-${{ needs.extract-version.outputs.version }}
          files: "*.flatpak"
          overwrite_files: true
          body: "Claude ${{ needs.extract-version.outputs.version }}"
          prerelease: true

  deploy:
    if: >-
      always() && !cancelled() &&
      github.ref_type == 'tag' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Download flatpak artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "*.flatpak"
          merge-multiple: true
      - name: Publish flatpak
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: "*.flatpak"
          overwrite_files: true
          prerelease: false
      - name: Deploy github pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
